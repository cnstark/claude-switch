version: "3.8"

services:
  cs-proxy:
    image: ghcr.io/cnstark/claude-switch:latest
    container_name: cs-proxy
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ${HOME}/.claude_switch:/root/.claude_switch
    restart: unless-stopped
    environment:
      - CS_CONFIG=/root/.claude_switch/config.yaml
