name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
            format: tar.gz
          - os: linux
            arch: arm64
            ext: ""
            format: tar.gz
          - os: windows
            arch: amd64
            ext: ".exe"
            format: zip
          - os: darwin
            arch: arm64
            ext: ""
            format: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o cs${{ matrix.ext }} ./cmd/cs
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o cs-proxy${{ matrix.ext }} ./cmd/cs-proxy

      - name: Package (tar.gz)
        if: matrix.format == 'tar.gz'
        run: |
          PKG="claude-switch_${{ steps.version.outputs.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p "$PKG"
          cp cs cs-proxy LICENSE README.md "$PKG/"
          tar czf "${PKG}.tar.gz" "$PKG"

      - name: Package (zip)
        if: matrix.format == 'zip'
        run: |
          PKG="claude-switch_${{ steps.version.outputs.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir "$PKG"
          cp cs.exe cs-proxy.exe LICENSE README.md "$PKG/"
          zip -r "${PKG}.zip" "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: claude-switch_*.${{ matrix.format }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -type f -name 'claude-switch_*' -exec cp {} . \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claude-switch_*.tar.gz
            claude-switch_*.zip
            install.sh
            install.ps1
